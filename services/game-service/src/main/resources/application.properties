spring.application.name=game-service
server.port=${PORT:8082}

spring.data.mongodb.uri=${MONGO_URI}

jwt.secret=${JWT_SECRET}

# Storage Service Integration
storage.service.url=${STORAGE_SERVICE_URL}

# Kafka configuration (Aiven Cloud)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.gamestore.game.event,com.gamestore.game.dto,com.gamestore.purchase.event
spring.kafka.consumer.properties.spring.json.type.mapping=purchaseCreated:com.gamestore.game.event.PurchaseCreatedEvent,downloadCreated:com.gamestore.game.event.DownloadCreatedEvent
spring.kafka.consumer.group-id=game-service

# Kafka Security (Aiven SASL_SSL)
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";
spring.kafka.properties.ssl.truststore.type=PEM
spring.kafka.properties.ssl.truststore.location=${KAFKA_TRUSTSTORE_LOCATION}
spring.kafka.properties.ssl.endpoint.identification.algorithm=

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Brevo SMTP configuration for transactional email
spring.mail.host=${BREVO_SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${BREVO_SMTP_PORT:587}
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=40000
spring.mail.properties.mail.smtp.writetimeout=40000

app.mail.from-address=${MAIL_FROM_ADDRESS}
auth.user.service.url=${AUTH_USER_SERVICE_URL:http://localhost:8087/api}

spring.mail.properties.mail.debug=false

# Redis Cloud configuration
# Use IPv4 to avoid local IPv6/NAT64 resolution timeout on some Windows networks
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=10s
spring.data.redis.lettuce.shutdown-timeout=2s
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Optional Aiven OpenSearch integration for AI-style search and recommendations
opensearch.enabled=${OPENSEARCH_ENABLED:false}
opensearch.scheme=${OPENSEARCH_SCHEME:https}
opensearch.host=${OPENSEARCH_HOST:gamespotlightsearchgames-gajerautsav08-9ccc.i.aivencloud.com}
opensearch.port=${OPENSEARCH_PORT:22498}
opensearch.username=${OPENSEARCH_USERNAME}
opensearch.password=${OPENSEARCH_PASSWORD}
opensearch.index=${OPENSEARCH_INDEX:games}

# Optional comma-separated synonym rules for OpenSearch index analysis
# Format: alias=Canonical Phrase, alias2=Another Canonical
# Example: opensearch.synonym-rules=coc=Clash of Clans,bgmi=Battlegrounds Mobile India,rc=Real Cricket
# You can also set via environment variable OPENSEARCH_SYNONYM_RULES
opensearch.synonym-rules=coc=Clash of Clans,bgmi=Battlegrounds Mobile India,rc=Real Cricket,bs=Brawl Stars
# Control automatic OpenSearch behaviors. Set true to enable; defaults here are conservative
# Enable automatic index deletion/rebuild on startup to apply new field mappings
opensearch.rebuild-index-on-startup=${OPENSEARCH_REBUILD_ON_STARTUP:false}
# Enable automatic backfill from MongoDB on ApplicationReadyEvent to populate new index
opensearch.backfill-on-startup=${OPENSEARCH_BACKFILL_ON_STARTUP:false}
# Enable automatic live-sync (index writes on create/update/delete) by default.
opensearch.sync-enabled=${OPENSEARCH_SYNC_ENABLED:true}
 
# Hikari connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
