spring.application.name=storage-service
server.port=${PORT:8085}

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=220MB

# Supabase configuration must be provided via environment variables in production.
# Prefer storage-specific variables so this service can use a separate Supabase project.
supabase.url=${STORAGE_SUPABASE_URL}
supabase.key=${STORAGE_SUPABASE_KEY}
supabase.bucket.game-files=${SUPABASE_BUCKET_GAME_FILES:game-files}
supabase.bucket.game-images=${SUPABASE_BUCKET_GAME_IMAGES:game-images}

# Local storage fallback (used if Supabase not configured)
storage.directory=/app/files

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO

# Hikari connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
