spring.application.name=auth-user-service
server.port=${PORT:8087}

# Require externalized DB credentials in production (no defaults)
spring.datasource.url=${POSTGRES_JDBC_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway DB migrations
## Flyway migrations are managed via CI. Disable automatic migrations on application startup
## in production to ensure migrations are run in a controlled CI/CD step.
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.properties.hibernate.format_sql=false
spring.datasource.hikari.initialization-fail-timeout=0

# Explicit dialect to avoid detection issues during startup
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:604800}

# Supabase credentials must be provided via env in production.
# Prefer auth-specific variables so this service can use a separate Supabase project.
supabase.url=${AUTH_SUPABASE_URL:${SUPABASE_URL:}}
supabase.anon-key=${AUTH_SUPABASE_ANON_KEY:${SUPABASE_ANON_KEY:}}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO

# Hikari connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2