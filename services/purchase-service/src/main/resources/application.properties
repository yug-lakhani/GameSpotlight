spring.application.name=purchase-service
server.port=${PORT:8083}

# Require externalized DB credentials in production (no defaults)
spring.datasource.url=${POSTGRES_JDBC_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway DB migrations
## Flyway migrations are managed via CI. Disable automatic migrations on application startup
## in production to ensure migrations are run in a controlled CI/CD step.
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Kafka configuration (Aiven Cloud)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.spring.json.type.mapping=purchaseCreated:com.gamestore.purchase.event.PurchaseCreatedEvent
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.gamestore.purchase.event
spring.kafka.consumer.group-id=purchase-service

# Kafka Security (Aiven SASL_SSL)
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";
spring.kafka.properties.ssl.truststore.type=PEM
spring.kafka.properties.ssl.truststore.location=${KAFKA_TRUSTSTORE_LOCATION}
spring.kafka.properties.ssl.endpoint.identification.algorithm=

# Redis Cloud configuration for idempotency key storage
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=10s
spring.data.redis.lettuce.shutdown-timeout=2s

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Brevo SMTP configuration for transactional email
spring.mail.host=${BREVO_SMTP_HOST}
spring.mail.port=${BREVO_SMTP_PORT}
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000

app.mail.from-address=${MAIL_FROM_ADDRESS}
auth.user.service.url=${AUTH_USER_SERVICE_URL}
game.service.url=${GAME_SERVICE_URL}

# Disable verbose mail debug in production
spring.mail.properties.mail.debug=false

# Hikari connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
