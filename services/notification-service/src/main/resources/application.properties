spring.application.name=notification-service
server.port=${PORT:8086}

# Require externalized Kafka config in production
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.gamestore.game.event,com.gamestore.purchase.event
spring.kafka.consumer.properties.spring.json.type.mapping=gameCreated:com.gamestore.game.event.GameCreatedEvent,purchaseCreated:com.gamestore.purchase.event.PurchaseCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=true

spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";
spring.kafka.properties.ssl.truststore.type=PEM
spring.kafka.properties.ssl.truststore.location=${KAFKA_TRUSTSTORE_LOCATION}
spring.kafka.properties.ssl.endpoint.identification.algorithm=

spring.mail.host=${BREVO_SMTP_HOST}
spring.mail.port=${BREVO_SMTP_PORT}
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=40000
spring.mail.properties.mail.smtp.writetimeout=40000
spring.mail.properties.mail.debug=true

auth.user.service.url=${AUTH_USER_SERVICE_URL:http://auth-user:8087/api}
game.service.url=${GAME_SERVICE_URL:http://game:8082/api}
app.kafka.topics.game-created=game.created
app.kafka.topics.purchase-created=game.purchases
app.kafka.listeners-enabled=${APP_KAFKA_LISTENERS_ENABLED:true}

app.mail.from-address=${MAIL_FROM_ADDRESS}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Disable verbose mail debug in production
spring.mail.properties.mail.debug=false

# Hikari connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
